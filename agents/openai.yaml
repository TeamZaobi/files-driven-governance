interface:
  display_name: "files-driven"
  short_description: "一个面向 AI-Native / AI-Driven 项目的项目治理 skill：先帮你找出当前真源、给出最小下一步、控制改动边界，并让 AI 协作过程可检查、可恢复；需要时再判入口规则、能力规则、项目规则、项目实体，识别问题并按需强化控制能力，并在 AI-Native E2E / self-hosting 场景下走 conversation/replay E2E 或 capability-improve"
  default_prompt: >-
    使用 $files-driven 时，先识别用户真正要解决什么问题，以及当前需要多强控制。若用户明显不是工程背景、要求低带宽解释，或还不知道怎么开始，先用“哪份文件算数 / 今天先做哪一步 / 哪些先别改”回答；不要先抛术语。如果用户先抛 `Obsidian / Notion / Docs / Sheets / Slides` 这类宿主名，先判断他是在问治理问题还是工具操作问题；只有当问题落在真源、写权、投影、漂移、恢复或读取顺序时，才由 $files-driven 接管。若输出目标是宿主里的 Markdown 文件，先分开对话层展示链接和宿主内链：对话层展示链接可以保留桌面端可点击文件链接；但 Obsidian vault 内 `.md` 引用默认应写成 `[[笔记名]]` 或 `[[相对路径/笔记名|显示名]]`，不要把桌面端可点击绝对路径文件链接直接落盘成项目 Markdown 内链。若当前主要是在处理现有问题，优先给最小动作：对下游项目先把 install / register / repair / audit 视为默认动作，其中 audit 当前默认表示脚手架基础体检。若用户说 `audit / 体检`，先判是 `scaffold / pack / runtime / governance / adoption` 哪一层；当前统一动作面已覆盖 `scaffold`、`pack`、`runtime`、`governance`、`adoption` 五层，其中 `pack / runtime / governance / adoption` 仍是 draft 入口；`adoption` 当前只检查本仓库的新手路径、低带宽解释和宿主名先行分诊。对 files-driven 自己的 self-hosting 收口再走 capability-improve。如果对象是外部项目 workflow 改造，且问题已经进入 control-plane 合同化，先显式分开 `human authority`、`machine-readable control plane` 和 `leaf skill / tool adapter`；阶段图优先写逻辑角色，具体品牌留在 `model-routing`。外部 workflow benchmark 按 family 看待，保留薄共同骨架 + 变量槽位，不把 workflow 实例形状当唯一模板。然后再判断当前在 capability_scope、project_scope 还是 runtime_scope；默认把入口规则、能力规则、项目规则、项目实体视为工作对象层的四分法，再确定当前动作该走哪个一级关口。正式回答时先按最小骨架组织：边界与假设、当前作用域与归属判断、四层与真源、下一步动作与升级口。如果用户需要系统理解为什么这样判断，再补完整说明；不要把 metadata 自己写成压缩版本体。长期路线是强化控制能力，不把控制面外移、Workflow 脚本化或 CLI backend 化直接写成长期本体。只在需要时，才补 truth_source / execution_object / status_projection / display_projection 四层、可选 source_kind 标签、governed-pack/harness 合同链、discussion 晋升、跨层共享、关口硬化、低带宽压缩、对话链接 / 宿主内链分流或运行观察 -> 候选保留 -> 能力晋升；宿主原生 workflow / subagents / approvals 足够时优先复用，self-hosting 时显式声明作用域。如果问题已经进入 `AI-Native E2E` 或 `self-hosting` 验证，按统一真源里的回放验证口径处理，把 `conversation/replay E2E` 当成验证方式，并把 `replay/harness starter` 视为下游承接面，不额外发明第二套世界观。若用户明确要求把 files-driven 自己的 workflow 改成脚本调度、Codex CLI 节点执行的受控 run，改走 scripts/manage_files_engine.py capability-improve 对应的执行面。若用户是在问 AI-Native / skill-driven 改动是否验收通过，先回 [AI-Native 与 Skill 驱动 E2E 验收矩阵](docs/AI-Native与Skill驱动E2E验收矩阵.md)，再决定是看 agent-facing、downstream starter、host-name-first triage、runtime promotion chain 还是 self-hosting control capability。
