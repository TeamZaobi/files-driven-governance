interface:
  display_name: "files-driven"
  short_description: "先做基础体检，再判入口规则、能力规则、项目规则、项目实体，给出当前最小治理动作"
  default_prompt: "使用 $files-driven 时，先判断当前在 capability_scope、project_scope 还是 runtime_scope；默认把入口规则、能力规则、项目规则、项目实体视为工作对象层的四分法，再确定当前动作该走哪个一级关口。正式回答时先按最小骨架组织：边界与假设、当前作用域与归属判断、四层与真源、下一步动作与升级口。只在需要时，才补 governed-pack/harness 合同链、discussion 晋升、跨层共享、关口硬化、低带宽压缩、self-hosting 或运行观察 -> 候选保留 -> 能力晋升区块。"
