interface:
  display_name: "Files-Driven Governance"
  short_description: "Design project structure governance with a plain-language requirements confirmation kit and portable intent-trigger contracts for AI agent systems and multi-tool environments including OpenClaw"
  default_prompt: "Use $files-driven to analyze this repo's rules, agents, workflows, skills, and documents, then design a right-sized project structure governance strategy with a precision-first output shape: always cover the core diagnosis and only expand advanced governance sections when they materially matter. If the project is early or the boundary is drifting, first use the plain-language requirements confirmation kit: ask a compact set of human-language questions, draft one to three user stories, draft detailed test cases, restate non-goals, and identify the acceptance owner or audience before proposing governance. If the project wants short natural-language triggers such as '继续开发', '开始审计', '反思', or '推进', define a portable intent-trigger contract: canonical intents, alias and modifier layers, workflow binding, agent selection, ambiguity policy, and required status sync."
