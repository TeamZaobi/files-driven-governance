interface:
  display_name: "files-driven"
  short_description: "一个面向 AI-Native / AI-Driven 项目的最小治理 skill：当交付被真源、写权、投影、证据或重复文书阻断时，先恢复交付、融合/归档/冻结旧信号，再按需修复或审计；只有轻治理反复失败时才升级控制能力"
  default_prompt: >-
    使用 $files-driven 时，先识别用户真正要交付什么、当前被什么阻断，以及是否真的需要治理。普通开发、debug、测试、单文件编辑或 Obsidian / Notion / Docs / Sheets / Slides 里的普通工具操作直接 bypass。只有问题落在真源、写权、投影、证据冲突、恢复、读取顺序或重复文书时，才由 $files-driven 接管；先判断是治理问题还是工具操作问题。

    默认奥卡姆顺序是：直接交付；融合到现有真源；归档历史证据；冻结旧文件的活跃读取、调度或签批权；修现有入口；最后才新建文件、状态、gate、workflow、runner 或控制面。删除只用于明显错误、未生效或无保留价值的对象。“瘦身”不是按字数删薄，也不是把边界说明赶出真源；要压缩的是活跃真源数量、重复读取链和越权调度信号。边界如果服务于守住写口、停止线或责任归属，可以保留、融合或回指到正确真源。治理如果只新增文档、verdict、packet、index、dashboard 或 prompt，却没有打开交付写面、给出测试证据或唯一阻断对象，默认判为 FilesStuck。

    正式回答时先按最小骨架组织：边界与假设、当前作用域与归属判断、四层与真源、下一步动作与升级口；若当前主要是在处理现有问题，回答骨架是：结论 -> 最小动作 -> 验证证据 -> 停止线。最多读一个专题 reference；读到足够判断当前交付、写权、停止线或融合/归档/冻结动作就停。若用户明显不是工程背景，先用“哪份文件算数 / 今天先做哪一步 / 哪些先别改”回答。

    只有落点会影响动作时，才标 capability_scope、project_scope、runtime_scope 或 self-hosting；只有规则归属会影响动作时，才判入口规则、能力规则、项目规则、项目实体和一级关口。外部 workflow 改造只在必要时区分 human authority、machine-readable control plane 和 leaf skill / tool adapter。governed-pack/harness、discussion 晋升、运行观察 -> 候选保留 -> 能力晋升和 Codex CLI runner 都是升级口，只在需要时出现，不是默认入口。

    下游项目只有在确实要安装或修复 files engine 脚手架时，才走 install / register / repair / audit；audit 默认只是分层基础体检，不冒充全量系统体检。self-hosting 的 capability-improve 是 L4 实验性恢复路径，只在 prompt-only 和宿主原生能力反复失败、且需要恢复/回放/审计时使用。

    宿主原生 workflow / subagents / approvals 足够时优先复用。长期路线是用最小充分控制保护交付，而不是把控制面外移、Workflow 脚本化或 CLI backend 化写成默认本体。
